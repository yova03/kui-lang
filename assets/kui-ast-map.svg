<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">KUI AST map</title>
  <desc id="desc">Tree map of the KUI internal AST model.</desc>
  <rect width="1500" height="900" fill="#ffffff"/>
  <text x="80" y="82" font-family="Arial Narrow, Arial, sans-serif" font-size="54" font-weight="800" fill="#111827">Mapa interno del AST</text>
  <text x="82" y="123" font-family="Arial, sans-serif" font-size="23" fill="#667085">El AST es el contrato entre parser, validador y renderer.</text>
  <g font-family="Arial Narrow, Arial, sans-serif" font-size="28" font-weight="800">
    <rect x="575" y="170" width="350" height="88" rx="12" fill="#111827"/>
    <text x="750" y="226" text-anchor="middle" fill="#ffffff">DocumentNode</text>
    <rect x="130" y="365" width="270" height="86" rx="12" fill="#FFF7ED" stroke="#C05A2B" stroke-width="3"/>
    <text x="265" y="418" text-anchor="middle" fill="#111827">Frontmatter</text>
    <rect x="455" y="365" width="270" height="86" rx="12" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="3"/>
    <text x="590" y="418" text-anchor="middle" fill="#111827">BlockNode[]</text>
    <rect x="780" y="365" width="270" height="86" rx="12" fill="#F0FDF4" stroke="#16794D" stroke-width="3"/>
    <text x="915" y="418" text-anchor="middle" fill="#111827">SymbolTable</text>
    <rect x="1105" y="365" width="270" height="86" rx="12" fill="#FEFCE8" stroke="#A06500" stroke-width="3"/>
    <text x="1240" y="418" text-anchor="middle" fill="#111827">Diagnostics</text>
  </g>
  <g fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round">
    <path d="M750 258v58"/>
    <path d="M265 316h975"/>
    <path d="M265 316v49"/>
    <path d="M590 316v49"/>
    <path d="M915 316v49"/>
    <path d="M1240 316v49"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="22" fill="#111827">
    <rect x="455" y="535" width="270" height="210" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="490" y="585">Heading</text>
    <text x="490" y="620">Paragraph</text>
    <text x="490" y="655">Table</text>
    <text x="490" y="690">Figure</text>
    <text x="490" y="725">FencedDiv</text>
    <rect x="780" y="535" width="270" height="210" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="815" y="585">labels</text>
    <text x="815" y="620">citations</text>
    <text x="815" y="655">bibliographyKeys</text>
    <text x="815" y="690">assets</text>
    <rect x="130" y="535" width="270" height="210" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="165" y="585">template</text>
    <text x="165" y="620">title / author</text>
    <text x="165" y="655">fontFamily</text>
    <text x="165" y="690">bib / metadata</text>
    <rect x="1105" y="535" width="270" height="210" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
    <text x="1140" y="585">KUI-W...</text>
    <text x="1140" y="620">KUI-E...</text>
    <text x="1140" y="655">position</text>
    <text x="1140" y="690">hint</text>
  </g>
</svg>
